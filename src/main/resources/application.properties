spring.application.name=web

#spring.datasource.url=jdbc:mysql://localhost:3306/academy_app
#Se modifica /academy_app  -> /mysql
#Se agrega linea spring.sql.init.mode=always
#esto permite siempre conectar a mysql sin necesidad de explicitar la base de datos (que podria no existir)
#se agrega archivo main/resources/data.sql con query de creación de database

spring.datasource.url=jdbc:mysql://localhost:3306/academy_app?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Admin

#permitir leer data.sql
spring.sql.init.mode=always


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.thymeleaf.cache=false
server.max-http-request-header-size=64KB

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


logging.level.org.hibernate.orm.jdbc.bind=TRACE