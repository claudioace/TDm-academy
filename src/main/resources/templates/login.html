<body>
    <h1>Pagina Login</h1>
    <form th:action="@{/login}" method="post">

            <label>Email</label>

        <div>
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" />

        <button type="submit">Login</button>
    </form>
    <div>
        <p>Credenciales para prueba:</p>
        <table class="border-gray">
            <thead>
                <tr >
                    <th>Rol</th>
                    <th>email</th>
                    <th>password</th>
                </tr>
            </thead>
            <tbody>
                <tr >
                    <td>Administrador</td>
                    <td>
                        admin@academy.com
                    </td>
                    <td>
                        admin
                    </td>
                </tr>
            </tbody>
        </table>
        
    </div>
</body>
</html>
