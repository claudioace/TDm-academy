<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Nueva Asignatura</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<script th:if="${errorMessage}">
    alert("[[${errorMessage}]]");
</script>
<body>
<div th:replace="~{fragments/navbar :: ${session.isAdmin} ? 'navbar-admin' : 'navbar-student'}"></div>
    <h1>Editar datos de Asignatura</h1>
    

    <form th:action="@{/courses/save}" th:object="${course}" method="post">
        <input type="hidden" th:field="*{id}" class="input-text"/>
        <p>
            <label for="name">Nombre de Asignatura</label>
            <input type="text" th:field="*{name}" class="input-text" required/>
        </p>
        <p>
            <label for="description">Descripcion</label>
            <textarea type="text" th:field="*{description}" class="input-paragraph" required/>
        </p>
        <button type="submit">Guardar</button>
    </form>
    <button onclick="history.back()" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> Regresar
    </button>    
</body>

</html>
