<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear Nuevo Usuario</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" th:href="@{/css/navbar.css}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<script th:if="${errorMessage}">
    alert("[[${errorMessage}]]");
</script>
<body>
<div th:replace="~{fragments/navbar :: ${session.isAdmin} ? 'navbar-admin' : 'navbar-student'}"></div>
    <h1>Editar datos de usuario</h1>
    

    <form th:action="@{/users/save}" th:object="${user}" method="post">
        <input type="hidden" th:field="*{id}" class="input-text"/>
        <p>
            <label for="dni">Identificacion</label>
            <input type="text" th:field="*{dni}" class="input-text" required/>
        </p>
        <p>
            <label for="firstName">Nombre</label>
            <input type="text" th:field="*{firstName}" class="input-text" required/>
        </p>
        <p>
            <label for="lastName">Apellido</label>
            <input type="text" th:field="*{lastName}" class="input-text" required/>
        </p>
        <p>
            <label for="email">Email</label>
            <input type="text" th:field="*{email}" class="input-text" required/>
        </p>
        <p th:if="${passNew}">
            <label for="password">Password</label>
            <input type="text" th:field="*{password}" class="input-text" required/>
            <small>Por defecto: password</small>
        </p>        
        <p>
            <label for="role">Rol del usuario:</label>
            <select id="role" name="role" required class="input-text">
                <option value="STUDENT">Estudiante</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </p>

        <button type="submit">Guardar</button>
    </form>
    <button onclick="history.back()" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> Regresar
    </button>
</body>

</html>
